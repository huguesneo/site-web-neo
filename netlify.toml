# Configuration Netlify

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # Seules les variables NEXT_PUBLIC_ légitimes (non secrètes) sont exemptées.
  # GEMINI_API_KEY, GHL_API_KEY, GHL_LOCATION_ID sont désormais des secrets purs
  # (sans NEXT_PUBLIC_) → plus dans le bundle navigateur, plus dans cette liste.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_MONERIS_ENV,NEXT_PUBLIC_MONERIS_HT_PROFILE_ID,GHL_LOCATION_ID,GHL_API_KEY"
